<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUS | Giriş Yap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen">

    <div class="bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700 w-96">
        <div class="text-center mb-8">
            <div class="inline-block p-4 bg-sky-500/10 rounded-full mb-4">
                <i class="fa-solid fa-shield-halved text-4xl text-sky-400"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">EUS Sistem Girişi</h1>
            <p class="text-slate-400 text-sm mt-1">Lütfen yetkili bilgilerinizi giriniz.</p>
        </div>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
        <div class="bg-red-500/10 border border-red-500 text-red-500 text-sm px-4 py-2 rounded mb-4 text-center">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-slate-400 text-sm mb-1">Kullanıcı Adı</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-3 text-slate-500"></i>
                    <input type="text" name="kullanici_adi" required
                        class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:border-sky-500">
                </div>
            </div>
            <div>
                <label class="block text-slate-400 text-sm mb-1">Şifre</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3 text-slate-500"></i>
                    <input type="password" name="sifre" required
                        class="w-full bg-slate-900 border border-slate-700 text-white rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:border-sky-500">
                </div>
            </div>
            <button type="submit"
                class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 px-4 rounded-lg transition duration-200 mt-6 shadow-lg shadow-sky-600/30">
                Sisteme Giriş Yap
            </button>
            <div class="text-center mt-4 text-xs text-slate-500">
                Test Hesapları: admin, rehberlik, ogretmen (Şifre: 1234)
            </div>
        </form>
    </div>

</body>

</html>
